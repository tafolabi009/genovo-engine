# cbindgen configuration for genovo-ffi
# Generates a C-compatible header from #[no_mangle] extern "C" Rust functions.

language = "C"
header = """
/* ========================================================================
 * genovo_ffi.h - Auto-generated by cbindgen. DO NOT EDIT.
 *
 * C API for the Genovo game engine.
 * ======================================================================== */
"""
trailer = """
/* End of genovo_ffi.h */
"""
include_guard = "GENOVO_FFI_H"
autogen_warning = "/* WARNING: This file is auto-generated by cbindgen. Do not modify manually. */"
include_version = true
namespace = ""
cpp_compat = true

[defines]

[export]
include = []
exclude = []
prefix = ""
item_types = ["constants", "globals", "enums", "structs", "unions", "typedefs", "opaque", "functions"]

[export.rename]

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[struct]
rename_fields = "None"
derive_eq = true

[fn]
rename_args = "None"

[parse]
parse_deps = false
include = []
exclude = []

[parse.expand]
crates = []
